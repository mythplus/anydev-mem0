services:
  # Milvus 依赖：etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=default=http://etcd:2380
      - ETCD_NAME=default
      - ETCD_DATA_DIR=/etcd
    volumes:
      - etcd_data:/etcd

  # Milvus 依赖：MinIO 对象存储
  minio:
    image: minio/minio:RELEASE.2023-10-25T06-33-25Z
    restart: unless-stopped
    command: server /minio_data
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio_data:/minio_data

  # Milvus 向量数据库（替代 Qdrant）
  mem0_store:
    image: milvusdb/milvus:v2.4.7
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  # PostgreSQL 数据库（替代 SQLite）
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=openmemory
      - POSTGRES_USER=openmemory
      - POSTGRES_PASSWORD=openmemory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  openmemory-mcp:
    image: mem0/openmemory-mcp
    build: api/
    environment:
      - USER=${USER:-default_user}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MILVUS_HOST=30.20.69.18
      - MILVUS_PORT=19530
      - DATABASE_URL=postgresql://openmemory:openmemory@postgres:5432/openmemory
    env_file:
      - api/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mem0_store
      - postgres
    ports:
      - "8765:8765"
    volumes:
      - ./api:/usr/src/openmemory
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload --workers 4"
  openmemory-ui:
    image: mem0/openmemory-ui:latest
    build: ui/
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8765
      - NEXT_PUBLIC_USER_ID=default_user
    depends_on:
      - openmemory-mcp
    ports:
      - "3000:3000"

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  postgres_data:
